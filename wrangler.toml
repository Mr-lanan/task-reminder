name = "task-reminder"
main = "src/index.js"
compatibility_date = "2024-12-18"

# KV 命名空间绑定（需先在 Dashboard 创建）
[[kv_namespaces]]
binding = "TASKS_KV"
id = "你的KV命名空间ID"   # 创建后替换

# 定时触发器（每小时）
[triggers]
crons = ["0 * * * *"]

# 环境变量（敏感信息通过 Dashboard 设置更安全，这里仅作占位）
[vars]
# JWT_SECRET = "your-secret"
# DEFAULT_USERNAME = "admin"
# DEFAULT_PASSWORD = "your-password"
