name: Deploy Worker

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动一键运行部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Bun 环境
        uses: oven-sh/setup-bun@v2

      - name: 安装项目依赖
        run: bun install

      - name: 部署 Cloudflare Worker
        run: npx wrangler deploy --kv TASKS_KV=${{ secrets.KV_NAMESPACE_ID }}
        env:
          WRANGLER_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
