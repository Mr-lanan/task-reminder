name: Deploy Worker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 全局注入 Cloudflare 鉴权变量，wrangler 才能识别
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Bun 环境
        uses: oven-sh/setup-bun@v2

      - name: 安装项目依赖
        run: bun install

      - name: 部署 Cloudflare Worker
        run: |
          set +e
          npx wrangler deploy
          status=$?
          if [ $status -ne 0 ] && [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "首次部署失败，重试时移除 CLOUDFLARE_ACCOUNT_ID（可能与 token 账号不匹配）..."
            unset CLOUDFLARE_ACCOUNT_ID
            npx wrangler deploy
            status=$?
          fi
          exit $status
