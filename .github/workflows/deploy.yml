name: Deploy Worker
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动一键部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装项目依赖
        run: npm install

      - name: 部署 Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 运行时动态注入KV，不修改源码文件
          command: deploy --kv TASKS_KV=${{ secrets.KV_NAMESPACE_ID }}
